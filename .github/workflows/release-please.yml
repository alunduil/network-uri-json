name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install release-please
        run: npm install --no-save release-please@17.6.0 @octokit/rest@21.0.2

      - name: Run release-please with PVP strategy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_PLEASE_TARGET_BRANCH: ${{ github.ref_name }}
        run: node .github/scripts/release-please-pvp.mjs
